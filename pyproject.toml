[project]
name = "neural-networks"
version = "0.1.0"
description = "Neural networks project"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "matplotlib>=3.10.9",
    "numpy>=2.2.6",
    "ruff>=0.15.12",
    "taskipy>=1.14.1",
]

[project.scripts]
start = "main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"

[tool.taskipy.tasks]
"lint" = "ruff check ."
"lint:fix" = "ruff format ."
